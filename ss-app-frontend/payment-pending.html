<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago pendiente — Sexy Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f9fafb;
    padding: 24px;
  }
  .result-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    padding: 48px 36px;
    text-align: center;
    max-width: 440px;
    width: 100%;
  }
  .result-icon {
    width: 72px; height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 2rem;
  }
  .result-icon--pending { background: #fffbeb; color: #b45309; }
  .result-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 12px;
  }
  .result-msg {
    font-size: 0.95rem;
    color: #6b7280;
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .result-btn {
    display: inline-block;
    padding: 14px 32px;
    background: #E91E8C;
    color: #fff;
    border-radius: 50px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    text-decoration: none;
    transition: background 0.2s;
  }
  .result-btn:hover { background: #c2185b; }
</style>
</head>
<body>
  <div class="result-card">
    <div class="result-icon result-icon--pending">&#9201;</div>
    <h1 class="result-title">Pago pendiente</h1>
    <p class="result-msg">Tu pago está siendo procesado. Te notificaremos cuando se confirme. Si pagaste en OXXO, puede tomar hasta 24 horas.</p>
    <a href="index.html" class="result-btn">Volver a la tienda</a>
  </div>
</body>
</html>
